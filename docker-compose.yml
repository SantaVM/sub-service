services:
  postgres:
    image: postgres:17.9-alpine3.23
    environment:
      POSTGRES_DB: ${DB_NAME:-subservice}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    restart: unless-stopped
    networks:
      - internal    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    env_file:
      - .env.docker
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
    internal: true   # недоступна извне

  public:
    driver: bridge

