# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

dotenv:
  - .env.local

vars:
  MAINFILE: ./cmd/server/main.go

tasks:
  default:
    desc: Runs the project
    cmds:
      - task: swag
      - go run {{.MAINFILE}}
    silent: false

  build:
    cmds:
      - go build -o ./bin/sub-service.exe {{.MAINFILE}}

  swag:
    cmds:
      - swag init -g {{.MAINFILE}} -o docs
    sources:
      - {.MAINFILE}
      - internal/handler/*.go
      - internal/model/*.go
    generates:
      - docs/docs.go
      - docs/swagger.json
      - docs/swagger.yaml

  lint:
    cmds:
      - golangci-lint run

  format:
    cmds:
      - golangci-lint fmt

  up:
    desc: Apply next new migration (if exists)
    cmds:
      - goose up

  down:
    desc: Rall back the last migration
    cmds:
      - goose down

  create:*:
    desc: Create a new migration file with name from CLI arguments after ":"
    vars:
      NAME: '{{index .MATCH 0}}'
    cmds:
      - goose create {{.NAME}} sql

  test:*:
    desc: "Запуск тестов"
    aliases: [t:*:]
    vars:
      PACKAGE: '{{index .MATCH 0}}'
    cmds:
      - cmd: go test -v -count=1 ./...
        if: '{{eq .PACKAGE ""}}'
      - cmd: go test -v -count=1 {{.PACKAGE}}
        if: '{{ne .PACKAGE ""}}'
    silent: false

  test-all:
    desc: "Запуск всех тестов с покрытием"
    cmds:
      - go test -v -count=1 -cover -timeout=30s ./...
    silent: false