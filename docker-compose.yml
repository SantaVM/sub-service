services:
  postgres:
    image: postgres:17-alpine
    container_name: sub-service-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-subservice}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sub-service-app
    environment:
      PORT: ${PORT:-8080}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-subservice}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  swagger:
    image: swaggerapi/swagger-ui
    container_name: sub-service-swagger
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /docs/swagger.json
    volumes:
      - ./docs:/docs
    depends_on:
      - app

volumes:
  postgres_data:
